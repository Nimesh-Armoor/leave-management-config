server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Auth Route
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Leave Route
spring.cloud.gateway.routes[1].id=leave-service
spring.cloud.gateway.routes[1].uri=lb://leave-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/leave/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

management.endpoints.web.exposure.include=*

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=leave-service
springdoc.swagger-ui.urls[1].url=/leave/v3/api-docs
